<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0B0F14">
<link rel="icon" href="favicon.svg">
<title>Sol & Simulación — Factiun</title>
<!-- sin fuentes de Google: offline (fuentes del sistema) -->
<style>
:root{
  --void:#0B0F14; --panel:#121922; --panel-2:#0F151D; --panel-hi:#18222D;
  --line:#23303D; --line-soft:#1A2530; --text:#E7EEF4; --muted:#8093A4; --muted-2:#5E6F7E;
  --live:#36D399; --build:#F6A623; --demo:#54A6FF; --idle:#6A7B8B; --dead:#D0594F;
  --accent:#36D399; --radius:14px; --radius-sm:9px;
  --mono:'IBM Plex Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
  --sans:'IBM Plex Sans',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  --display:'Space Grotesk','IBM Plex Sans',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--void);color:var(--text);font-family:var(--sans);min-height:100vh;font-variant-numeric:tabular-nums}
.bar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:11px 18px;background:var(--panel-2);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:30}
.bar .back{color:var(--muted);text-decoration:none;font:600 13px/1 var(--sans);padding:7px 11px;border:1px solid var(--line);border-radius:10px;white-space:nowrap}
.bar .back:hover{color:var(--text);border-color:var(--accent)}
.bar h1{font:700 17px/1.1 var(--display)}
.bar .sub{color:var(--muted);font-size:12.5px;margin-right:auto}
.bar .brand{color:var(--accent);font:700 14px/1 var(--display);letter-spacing:.04em}
.engine{display:flex;align-items:center;gap:7px;font-size:12px;font-family:var(--mono);padding:4px 10px;border:1px solid var(--line);border-radius:20px;background:var(--panel)}
.engine .led{width:9px;height:9px;border-radius:50%;background:var(--idle)}
.engine.on .led{background:var(--live);box-shadow:0 0 7px var(--live)}
.engine.off .led{background:var(--dead)}
.wrap{max-width:1080px;margin:0 auto;padding:20px 18px 60px}
.grid{display:grid;grid-template-columns:340px 1fr;gap:18px}
@media(max-width:820px){.grid{grid-template-columns:1fr}}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px}
.card h2{font:700 13px/1 var(--display);letter-spacing:.02em;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.card h2 .ic{color:var(--accent)}
.field{margin-bottom:11px}
.field label{display:block;font-size:11.5px;color:var(--muted);margin-bottom:4px;font-weight:600}
.field input,.field select{width:100%;background:var(--panel-2);color:var(--text);border:1px solid var(--line);border-radius:8px;padding:8px 10px;font:inherit;font-size:13px}
.field input:focus,.field select:focus{outline:none;border-color:var(--accent)}
.two{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.btn{background:rgba(54,211,153,.12);color:var(--accent);border:1px solid var(--accent);border-radius:9px;padding:9px 14px;font:inherit;font-size:13px;font-weight:600;cursor:pointer;width:100%}
.btn:hover{background:rgba(54,211,153,.2);color:#fff}
.btn.ghost{background:var(--panel-2);color:var(--text);border-color:var(--line)}
.readout{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-top:14px}
.ro{background:var(--panel-2);border:1px solid var(--line-soft);border-radius:9px;padding:9px 11px}
.ro .k{font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);font-family:var(--mono)}
.ro .v{font:700 17px/1.2 var(--display);margin-top:3px}
.ro .v small{font-size:12px;color:var(--muted);font-weight:400}
canvas{width:100%;height:auto;display:block;background:var(--panel-2);border:1px solid var(--line-soft);border-radius:10px;margin-top:6px}
.note{font-size:12px;color:var(--muted-2);margin-top:10px;line-height:1.5}
.note code{color:var(--muted);background:var(--panel-2);padding:1px 5px;border-radius:5px;font-family:var(--mono)}
.slider-row{display:flex;align-items:center;gap:10px;margin-top:12px}
.slider-row input[type=range]{flex:1;accent-color:var(--accent)}
.slider-row .hourlbl{font-family:var(--mono);font-size:13px;min-width:54px;text-align:right;color:var(--accent)}
.engmsg{background:var(--panel-2);border:1px dashed var(--line2,#2b3a4d);border-color:var(--build);border-radius:9px;padding:11px 13px;font-size:12.5px;color:var(--text);line-height:1.55}
.engmsg code{background:#0b0f14;color:var(--build);padding:1px 6px;border-radius:5px;font-family:var(--mono);font-size:11.5px}
.tag{font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted-2);margin-top:2px}
</style>
</head>
<body>
<header class="bar">
  <a class="back" href="index.html">← Panel</a>
  <h1>Sol &amp; Simulación</h1>
  <span class="sub">Geometría solar · producción</span>
  <div class="engine" id="engine"><span class="led"></span><span id="engineTxt">motor…</span></div>
  <span class="brand">Factiun</span>
</header>

<div class="wrap">
  <div class="grid">
    <!-- ENTRADAS -->
    <div class="card">
      <h2><span class="ic">☉</span> Emplazamiento</h2>
      <div class="field"><label>Planta (de la cartera)</label>
        <select id="plant"><option value="">— manual —</option></select></div>
      <div class="two">
        <div class="field"><label>Latitud °</label><input id="lat" type="number" step="0.0001" value="41.65"></div>
        <div class="field"><label>Longitud °</label><input id="lon" type="number" step="0.0001" value="-0.9"></div>
      </div>
      <div class="two">
        <div class="field"><label>Fecha</label><input id="date" type="date" value="2026-06-21"></div>
        <div class="field"><label>UTC ± horas</label><input id="tz" type="number" step="0.5" value="2"></div>
      </div>
      <div class="field"><label>Altura del objeto (m) — para la sombra</label><input id="obj" type="number" step="0.1" value="3"></div>
      <p class="tag">Geometría: algoritmo NOAA en el navegador (offline, ~0,01°).</p>
    </div>

    <!-- GEOMETRÍA SOLAR -->
    <div class="card">
      <h2><span class="ic">◔</span> Geometría solar <span style="margin-left:auto;font:400 11px var(--mono);color:var(--muted)">elevación vs hora local</span></h2>
      <canvas id="sky" width="700" height="280"></canvas>
      <div class="slider-row">
        <span style="font-size:12px;color:var(--muted)">Hora</span>
        <input type="range" id="hour" min="0" max="1439" step="5" value="720">
        <span class="hourlbl" id="hourlbl">12:00</span>
      </div>
      <div class="readout" id="ro"></div>
    </div>
  </div>

  <!-- PRODUCCIÓN -->
  <div class="card" style="margin-top:18px">
    <h2><span class="ic">⚡</span> Producción <span style="margin-left:auto;font:400 11px var(--mono);color:var(--muted)">fija vs tracker</span></h2>
    <div class="grid">
      <div>
        <div class="two">
          <div class="field"><label>Montaje</label><select id="kind"><option value="tracker">Tracker (1 eje)</option><option value="fixed">Fija</option></select></div>
          <div class="field"><label>Modo</label><select id="mode"><option value="rapida">Rápida (PVWatts)</option><option value="bancable">Bancable (P50)</option></select></div>
        </div>
        <div class="field"><label>Módulo CEC <span style="color:var(--muted-2);font-weight:400">· motor</span></label>
          <input id="modcec" list="modlist" placeholder="busca: JA Solar, Longi, Trina…" autocomplete="off">
          <datalist id="modlist"></datalist></div>
        <div class="two">
          <div class="field"><label>Módulo Pmpp (W)</label><input id="pmpp" type="number" value="605"></div>
          <div class="field"><label>Nº módulos</label><input id="nmod" type="number" value="23072"></div>
        </div>
        <div class="two" id="trkParams">
          <div class="field"><label>GCR</label><input id="gcr" type="number" step="0.001" value="0.397"></div>
          <div class="field"><label>Ángulo máx °</label><input id="maxang" type="number" value="55"></div>
        </div>
        <div class="two" id="fixParams" style="display:none">
          <div class="field"><label>Inclinación °</label><input id="tilt" type="number" value="30"></div>
          <div class="field"><label>Azimut °</label><input id="azi" type="number" value="180"></div>
        </div>
        <details style="margin:2px 0 12px"><summary style="cursor:pointer;font-size:12px;color:var(--muted);font-weight:600">Economía (LCOE / NPV / IRR)</summary>
          <div class="two" style="margin-top:9px">
            <div class="field"><label>Capex €/kW</label><input id="capex" type="number" value="600"></div>
            <div class="field"><label>Opex €/kW·año</label><input id="opex" type="number" value="12"></div>
          </div>
          <div class="two">
            <div class="field"><label>Precio €/MWh</label><input id="price" type="number" value="55"></div>
            <div class="field"><label>Descuento %</label><input id="disc" type="number" step="0.1" value="6"></div>
          </div>
          <div class="two">
            <div class="field"><label>Vida (años)</label><input id="life" type="number" value="30"></div>
            <div class="field" style="display:flex;align-items:flex-end"><label style="display:flex;align-items:center;gap:7px;font-weight:400;color:var(--muted);margin:0 0 9px"><input type="checkbox" id="econOn"> calcular al simular</label></div>
          </div>
        </details>
        <div style="display:flex;gap:8px">
          <button class="btn" id="simBtn" style="flex:1">▶ Simular</button>
          <button class="btn ghost" id="demBtn" style="flex:none" title="Relieve del emplazamiento (motor, online)">⛰ Relieve</button>
        </div>
      </div>
      <div>
        <div id="prodOut"></div>
        <div id="demOut" style="margin-top:10px"></div>
      </div>
    </div>
  </div>
</div>

<script>
"use strict";
var RAD=Math.PI/180;
function $(id){return document.getElementById(id);}

/* ===================== GEOMETRÍA SOLAR (NOAA, navegador, offline) ===================== */
function julianDay(ms){return ms/86400000+2440587.5;}
function refraction(elev){ // grados → corrección atmosférica (grados)
  if(elev>85)return 0; var te=Math.tan(elev*RAD),r;
  if(elev>5)r=58.1/te-0.07/(te*te*te)+0.000086/Math.pow(te,5);
  else if(elev>-0.575)r=1735+elev*(-518.2+elev*(103.4+elev*(-12.79+elev*0.711)));
  else r=-20.772/te;
  return r/3600;
}
function solarGeom(dateUTCms,lat,lon){
  var jd=julianDay(dateUTCms),T=(jd-2451545)/36525;
  var L0=(280.46646+T*(36000.76983+T*0.0003032))%360; if(L0<0)L0+=360;
  var M=357.52911+T*(35999.05029-0.0001537*T);
  var e=0.016708634-T*(0.000042037+0.0000001267*T);
  var Mr=M*RAD;
  var C=Math.sin(Mr)*(1.914602-T*(0.004817+0.000014*T))+Math.sin(2*Mr)*(0.019993-0.000101*T)+Math.sin(3*Mr)*0.000289;
  var trueLong=L0+C, omega=125.04-1934.136*T;
  var appLong=trueLong-0.00569-0.00478*Math.sin(omega*RAD);
  var eps0=23+(26+((21.448-T*(46.815+T*(0.00059-T*0.001813))))/60)/60;
  var eps=eps0+0.00256*Math.cos(omega*RAD);
  var decl=Math.asin(Math.sin(eps*RAD)*Math.sin(appLong*RAD))/RAD;
  var y=Math.tan(eps*RAD/2); y*=y;
  var L0r=L0*RAD;
  var Et=y*Math.sin(2*L0r)-2*e*Math.sin(Mr)+4*e*y*Math.sin(Mr)*Math.cos(2*L0r)-0.5*y*y*Math.sin(4*L0r)-1.25*e*e*Math.sin(2*Mr);
  var eqTime=4*Et/RAD;
  var d=new Date(dateUTCms);
  var mins=d.getUTCHours()*60+d.getUTCMinutes()+d.getUTCSeconds()/60;
  var tst=(mins+eqTime+4*lon)%1440; if(tst<0)tst+=1440;
  var ha=tst/4-180;
  var latr=lat*RAD,declr=decl*RAD,har=ha*RAD;
  var cosZ=Math.sin(latr)*Math.sin(declr)+Math.cos(latr)*Math.cos(declr)*Math.cos(har);
  cosZ=Math.max(-1,Math.min(1,cosZ));
  var zen=Math.acos(cosZ)/RAD, elev=90-zen;
  var azDen=Math.cos(latr)*Math.sin(zen*RAD), az;
  if(Math.abs(azDen)>1e-9){var azc=(Math.sin(latr)*Math.cos(zen*RAD)-Math.sin(declr))/azDen;azc=Math.max(-1,Math.min(1,azc));az=Math.acos(azc)/RAD;if(ha>0)az=(az+180)%360;else az=(540-az)%360;}
  else az=(lat>decl)?180:0;
  return {elevation:elev+refraction(elev),azimuth:az,declination:decl};
}
// instante (hora local en minutos) → ms UTC, restando el offset
function localToUTCms(dateStr,localMin,tzOff){
  var p=dateStr.split('-'); // YYYY-MM-DD
  var base=Date.UTC(+p[0],+p[1]-1,+p[2],0,0,0);
  return base+(localMin-tzOff*60)*60000;
}
function compass(a){var d=['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSO','SO','OSO','O','ONO','NO','NNO'];return d[Math.round(a/22.5)%16];}

function dayCurve(lat,lon,dateStr,tzOff){
  var pts=[],peak={el:-99,min:0},rise=null,set=null,prev=null;
  for(var m=0;m<=1440;m+=4){
    var g=solarGeom(localToUTCms(dateStr,m,tzOff),lat,lon);
    pts.push({m:m,el:g.elevation,az:g.azimuth});
    if(g.elevation>peak.el){peak.el=g.elevation;peak.min=m;peak.az=g.azimuth;}
    if(prev){ if(prev.el<0&&g.elevation>=0)rise=m; if(prev.el>=0&&g.elevation<0)set=m; }
    prev={el:g.elevation};
  }
  return {pts:pts,peak:peak,rise:rise,set:set};
}
function hhmm(min){if(min==null)return '—';min=((min%1440)+1440)%1440;var h=Math.floor(min/60),mm=Math.round(min%60);if(mm===60){mm=0;h++;}return (h<10?'0':'')+h+':'+(mm<10?'0':'')+mm;}

var CUR=null;
function drawSky(){
  var lat=+$('lat').value,lon=+$('lon').value,tz=+$('tz').value,date=$('date').value;
  CUR=dayCurve(lat,lon,date,tz);
  var cv=$('sky'),ctx=cv.getContext('2d'),W=cv.width,H=cv.height,padL=34,padB=22,padT=10,padR=8;
  ctx.clearRect(0,0,W,H);
  var x0=padL,x1=W-padR,y0=H-padB,y1=padT, gx=function(m){return x0+(m/1440)*(x1-x0);}, gy=function(el){return y0-(Math.max(0,el)/90)*(y0-y1);};
  // rejilla
  ctx.strokeStyle='#1A2530';ctx.fillStyle='#5E6F7E';ctx.font='10px ui-monospace,monospace';ctx.lineWidth=1;
  for(var e=0;e<=90;e+=30){var yy=gy(e);ctx.beginPath();ctx.moveTo(x0,yy);ctx.lineTo(x1,yy);ctx.stroke();ctx.fillText(e+'°',4,yy+3);}
  for(var hh=0;hh<=24;hh+=6){var xx=gx(hh*60);ctx.beginPath();ctx.moveTo(xx,y0);ctx.lineTo(xx,y1);ctx.stroke();ctx.fillText((hh<10?'0':'')+hh+'h',xx-7,H-7);}
  // curva de elevación
  ctx.beginPath();var started=false;
  CUR.pts.forEach(function(p){var xx=gx(p.m),yy=gy(p.el);if(!started){ctx.moveTo(xx,yy);started=true;}else ctx.lineTo(xx,yy);});
  ctx.strokeStyle='#F6A623';ctx.lineWidth=2;ctx.stroke();
  // relleno bajo curva
  ctx.lineTo(gx(1440),y0);ctx.lineTo(gx(0),y0);ctx.closePath();ctx.fillStyle='rgba(246,166,35,.10)';ctx.fill();
  // orto / ocaso
  ctx.fillStyle='#36D399';
  [CUR.rise,CUR.set].forEach(function(m){if(m!=null){var xx=gx(m);ctx.fillRect(xx-1,y1,2,y0-y1);}});
  // punto en la hora seleccionada
  var hm=+$('hour').value, g=solarGeom(localToUTCms(date,hm,tz),lat,lon);
  if(g.elevation>0){var xx=gx(hm),yy=gy(g.elevation);ctx.beginPath();ctx.arc(xx,yy,5,0,7);ctx.fillStyle='#54A6FF';ctx.fill();ctx.strokeStyle='#0B0F14';ctx.lineWidth=2;ctx.stroke();}
  updateReadout(g,hm);
}
function updateReadout(g,hm){
  $('hourlbl').textContent=hhmm(hm);
  var obj=+$('obj').value, shadow='—', sdir='';
  if(g.elevation>0.05 && obj>0){var sl=obj/Math.tan(g.elevation*RAD); shadow=sl.toFixed(2)+' m'; sdir=compass((g.azimuth+180)%360);}
  var ro=$('ro');
  ro.innerHTML=
    card('Elevación',(g.elevation>0?g.elevation.toFixed(1):'—'),'°')+
    card('Azimut',g.azimuth.toFixed(1),'° '+compass(g.azimuth))+
    card('Pico solar',CUR.peak.el.toFixed(1),'° · '+hhmm(CUR.peak.min))+
    card('Orto / ocaso',hhmm(CUR.rise),'→ '+hhmm(CUR.set))+
    card('Sombra obj.',shadow,sdir?('hacia '+sdir):'');
}
function card(k,v,s){return '<div class="ro"><div class="k">'+k+'</div><div class="v">'+v+(s?' <small>'+s+'</small>':'')+'</div></div>';}

/* ===================== MOTOR SOLARGPT (puente local) ===================== */
var ENGINE=null, ENGINE_PORTS=[8765,8000,9000];
async function detectEngine(){
  for(var i=0;i<ENGINE_PORTS.length;i++){
    var url='http://127.0.0.1:'+ENGINE_PORTS[i];
    try{var r=await fetch(url+'/health',{cache:'no-store'});if(r.ok){var j=await r.json();if(j&&j.ok){ENGINE=url;setEngine(true,'motor SolarGPT ✓ (pvlib '+(j.pvlib||'?')+')');return;}}}catch(e){}
  }
  setEngine(false,'motor no conectado');
}
function setEngine(on,txt){var el=$('engine');el.className='engine '+(on?'on':'off');$('engineTxt').textContent=txt;}

function engineOffMsg(){
  return '<div class="engmsg"><b>El motor SolarGPT no está conectado.</b><br>'+
    'La producción real (TMY, CEC, térmico, pérdidas) corre en el motor Python, en tu máquina/LAN — así el dato no sale de tu red.<br><br>'+
    'Arráncalo:<br><code>cd server &amp;&amp; ./run.sh</code><br>'+
    '(repo SolarGPT; escucha en <code>127.0.0.1:8765</code>). Luego recarga.</div>'+
    '<p class="note">Mientras tanto, la <b>geometría solar</b> de arriba funciona offline.</p>';
}
var MOD=null;   // parámetros del módulo CEC elegido (de /modules)

async function simulate(){
  var out=$('prodOut'); $('demOut').innerHTML='';
  var lat=+$('lat').value,lon=+$('lon').value,kind=$('kind').value,mode=$('mode').value;
  if(!ENGINE){ out.innerHTML=engineOffMsg(); return; }
  out.innerHTML='<p class="note">Simulando en el motor…</p>';
  try{
    var j, foot;
    if(mode==='bancable'){
      var body={lat:lat,lon:lon,policy:'pvlib',strict:false,meteo_mode:'openmeteo',
        tracker:{max_angle:+$('maxang').value,gcr:+$('gcr').value,backtrack:true}};
      var r=await fetch(ENGINE+'/bankable',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(body)});
      if(!r.ok){var t=await r.text();throw new Error('HTTP '+r.status+' · '+t.slice(0,180));}
      j=await r.json();
      out.innerHTML='<div class="readout">'+
        card('POA P50',j.e_poa_kwh_m2!=null?Math.round(j.e_poa_kwh_m2):'—','kWh/m²·año')+
        card('Política',j.policy_name||'—','')+
        card('QA',j.qa_all_passed===true?'✓ pasa':(j.qa_all_passed===false?'✗ falla':'—'),'gates')+
        card('θ tracker',j.theta_out_summary?(Math.round(j.theta_out_summary.min)+'…'+Math.round(j.theta_out_summary.max)):'—','°')+
        '</div><p class="note">Pipeline <b>bancable</b> · '+(kind==='fixed'?'(evalúa eje tracker)':'tracker')+'. Para fija usa modo Rápida.</p>';
      return;
    }
    var sys=(kind==='fixed')?{tilt_deg:+$('tilt').value,azimuth_deg:+$('azi').value}
                            :{max_angle_deg:+$('maxang').value,gcr:+$('gcr').value,backtrack:true};
    var body2={lat:lat,lon:lon,kind:kind,system:sys,module:moduleSpec(),
      losses:{soiling_pct:2.0,mismatch_pct:2.0},meteo_mode:'openmeteo'};
    var r2=await fetch(ENGINE+'/generation',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(body2)});
    if(!r2.ok){var t2=await r2.text();throw new Error('HTTP '+r2.status+' · '+t2.slice(0,180));}
    j=await r2.json();
    out.innerHTML='<div class="readout">'+
      card('Producción AC',j.annual_ac_kwh!=null?(j.annual_ac_kwh/1e6).toFixed(2):'—','GWh/año')+
      card('Yield',j.yield_kwh_kwp_y!=null?Math.round(j.yield_kwh_kwp_y):'—','kWh/kWp')+
      card('PR',j.pr_net!=null?(j.pr_net*100).toFixed(1):'—','%')+
      card('POA',j.poa_annual_kwh_m2!=null?Math.round(j.poa_annual_kwh_m2):'—','kWh/m²')+
      '</div><p class="note">Motor SolarGPT · '+(MOD?'módulo CEC <b>'+MOD._name+'</b> · ':'')+'meteo openmeteo · '+(j.meteo_rows||'?')+' filas.</p>';
    if($('econOn').checked && j.yield_kwh_kwp_y) await runEconomy(j.yield_kwh_kwp_y, out);
  }catch(e){ out.innerHTML='<div class="engmsg">No se pudo simular: '+(e&&e.message||e)+'</div>'; }
}

function moduleSpec(){
  var m={pmpp_w:+$('pmpp').value,n_modules:+$('nmod').value,power_model:'pvwatts'};
  return m;   // Pmpp del módulo CEC ya queda volcado en #pmpp; el single-diode CEC se podrá activar luego
}

async function runEconomy(yieldKwhKwp,out){
  try{
    var ei={capex_eur_per_kw:+$('capex').value,opex_eur_per_kw_year:+$('opex').value,
      price_eur_per_mwh:+$('price').value,discount_rate:(+$('disc').value)/100,lifetime_years:+$('life').value};
    var r=await fetch(ENGINE+'/economy',{method:'POST',headers:{'content-type':'application/json'},
      body:JSON.stringify({inputs:ei,energy_kwh_kwp_y:yieldKwhKwp})});
    if(!r.ok)return; var e=await r.json();
    out.innerHTML+='<div class="readout" style="margin-top:8px">'+
      card('LCOE',e.lcoe_eur_per_mwh!=null?Math.round(e.lcoe_eur_per_mwh):'—','€/MWh')+
      card('IRR',e.irr_pct!=null?(+e.irr_pct).toFixed(1):'—','%')+
      card('NPV',e.npv_eur_per_kw!=null?Math.round(e.npv_eur_per_kw):'—','€/kW')+
      '</div>';
  }catch(_){}
}

function elevColor(t){ // cota normalizada [0,1] → rampa tipo terreno (índigo→azul→verde→ocre→rojo)
  var stops=[[0,44,26,77],[.25,42,111,151],[.5,42,157,143],[.7,233,196,106],[.85,231,111,81],[1,214,40,40]];
  for(var i=1;i<stops.length;i++){if(t<=stops[i][0]){var a=stops[i-1],b=stops[i],f=(t-a[0])/(b[0]-a[0]);
    return [Math.round(a[1]+(b[1]-a[1])*f),Math.round(a[2]+(b[2]-a[2])*f),Math.round(a[3]+(b[3]-a[3])*f)];}}
  return [214,40,40];
}
function drawDemGrid(grid){
  if(!grid||!grid.length)return; var ny=grid.length,nx=grid[0].length,mn=1e9,mx=-1e9,x,y;
  for(y=0;y<ny;y++)for(x=0;x<nx;x++){var v=grid[y][x];if(v==null||isNaN(v))continue;if(v<mn)mn=v;if(v>mx)mx=v;}
  var rng=(mx-mn)||1, cv=$('demcv'); if(!cv)return; cv.width=nx;cv.height=ny;
  var c2=cv.getContext('2d'),img=c2.createImageData(nx,ny);
  for(y=0;y<ny;y++)for(x=0;x<nx;x++){var w=grid[y][x],o=(y*nx+x)*4;
    if(w==null||isNaN(w)){img.data[o+3]=0;continue;}
    var c=elevColor((w-mn)/rng);img.data[o]=c[0];img.data[o+1]=c[1];img.data[o+2]=c[2];img.data[o+3]=255;}
  c2.putImageData(img,0,0);
}
async function relieve(){
  var d=$('demOut');
  if(!ENGINE){ d.innerHTML='<p class="note">El relieve necesita el motor (y conexión para el DEM).</p>'; return; }
  d.innerHTML='<p class="note">Consultando relieve…</p>';
  try{
    var r=await fetch(ENGINE+'/dem',{method:'POST',headers:{'content-type':'application/json'},
      body:JSON.stringify({lat:+$('lat').value,lon:+$('lon').value,n:64,grid:true})});
    if(!r.ok){var t=await r.text();throw new Error('HTTP '+r.status+' · '+t.slice(0,140));}
    var j=await r.json(), smax=Math.max(j.slope_ns_max_deg||0,j.slope_ew_max_deg||0);
    d.innerHTML='<div class="readout">'+
      card('Cota','['+Math.round(j.elev_min)+'–'+Math.round(j.elev_max)+']','m · Δ'+Math.round(j.elev_range))+
      card('Pendiente media',j.slope_mean_deg!=null?(+j.slope_mean_deg).toFixed(1):'—','°')+
      card('Pendiente máx',smax?smax.toFixed(1):'—','°')+
      '</div>'+
      (j.elev_grid?'<canvas id="demcv" style="width:100%;height:auto;image-rendering:pixelated;border:1px solid var(--line-soft);border-radius:8px;margin-top:8px"></canvas>':'')+
      '<p class="note">DEM '+(j.source||'?')+' · '+(j.n||'?')+'×'+(j.n||'?')+' · heatmap de cota (estilo S.P.A.C.E).</p>';
    if(j.elev_grid)drawDemGrid(j.elev_grid);
  }catch(e){ d.innerHTML='<div class="engmsg">No se pudo obtener el relieve: '+(e&&e.message||e)+'</div>'; }
}

/* búsqueda de módulo CEC contra /modules */
var _modT;
$('modcec').addEventListener('input',function(){
  clearTimeout(_modT); MOD=null; var q=this.value.trim();
  if(!ENGINE||q.length<2)return;
  _modT=setTimeout(async function(){
    try{var r=await fetch(ENGINE+'/modules?limit=12&q='+encodeURIComponent(q));if(!r.ok)return;
      var j=await r.json();
      $('modlist').innerHTML=(j.modules||[]).map(function(n){return '<option value="'+String(n).replace(/"/g,'&quot;')+'">';}).join('');
    }catch(e){}
  },260);
});
$('modcec').addEventListener('change',async function(){
  var n=this.value.trim(); if(!ENGINE||!n)return;
  try{var r=await fetch(ENGINE+'/modules?name='+encodeURIComponent(n));if(!r.ok)return;
    var j=await r.json(), p=j.params||{}; var pm=p.STC||p.PTC||p.Pmpp;
    if(pm){$('pmpp').value=Math.round(pm);}
    MOD=p; MOD._name=j.name||n;
  }catch(e){}
});

/* ===================== wiring ===================== */
/* plantas de la cartera (factiun_plantas en localStorage compartido) */
var PLANTS={};
var COORDS_FALLBACK={'24002':[41.57634,-0.79814],'24025':[39.11821,-1.15985],'24019':[-16.59577,-71.80644]};
function loadPlants(){
  try{PLANTS=JSON.parse(localStorage.getItem('factiun_plantas')||'{}')||{};}catch(e){PLANTS={};}
  var opts='<option value="">— manual —</option>';
  Object.keys(PLANTS).sort().forEach(function(cod){var p=PLANTS[cod];opts+='<option value="'+cod+'">'+((p&&p.nombre)||'?')+' · '+cod+'</option>';});
  $('plant').innerHTML=opts;
}
function pickPlant(cod){
  var p=PLANTS[cod]; if(!p)return;
  var c=(p.lat!=null&&p.lon!=null)?[p.lat,p.lon]:COORDS_FALLBACK[cod];
  if(c){$('lat').value=c[0];$('lon').value=c[1];}
  if(p.wmod)$('pmpp').value=Math.round(p.wmod);
  if(p.cantidad)$('nmod').value=Math.round(p.cantidad);
  drawSky();
}
$('plant').onchange=function(){if(this.value)pickPlant(this.value);};
$('kind').onchange=function(){var trk=this.value==='tracker';$('trkParams').style.display=trk?'':'none';$('fixParams').style.display=trk?'none':'';};
['lat','lon','date','tz','obj'].forEach(function(id){$(id).addEventListener('input',drawSky);});
$('hour').addEventListener('input',drawSky);
$('simBtn').onclick=simulate;
$('demBtn').onclick=relieve;
window.addEventListener('resize',drawSky);
loadPlants();
drawSky();
detectEngine();
